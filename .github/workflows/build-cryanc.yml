name: Build cryanc

on:
  push:
    branches: [main]
    paths:
      - 'cryanc/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: cryanc
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cryanc-carl:latest
          build-args: |
            CRYANC_REF=main
