services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: ${ADGUARD_CONTAINER_NAME:-adguard-home}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Set ADGUARD_DNS_PORT=53 in .env to use as DNS on the G3 (standard port).
      # Default 5354 avoids common host DNS and mDNS/Bonjour port 5353.
      - "${ADGUARD_DNS_PORT:-5354}:53/tcp"
      - "${ADGUARD_DNS_PORT:-5354}:53/udp"
      - "${ADGUARD_SETUP_PORT:-3080}:3000/tcp"
      - "${ADGUARD_WEB_PORT:-3001}:80/tcp"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  webone:
    image: u306060/webone:latest
    container_name: webone
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8091:8080"
    environment:
      - TZ=${TZ:-Europe/Brussels}
      - SERVICE_PORT=8080
      - CONFIG_PATH=/etc/webone/webone.conf
      - PROXY_HOSTNAME=${PROXY_HOSTNAME:?set PROXY_HOSTNAME in .env}
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  cryanc:
    image: ghcr.io/tommiec/cryanc-carl:latest
    container_name: cryanc
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8767:8765"
    environment:
      - CARL_PORT=8765
      - CARL_OPTS=-p -t
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  macproxy:
    image: rdmark/macproxy:latest
    container_name: macproxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5003:5001"
    security_opt:
      - no-new-privileges:true
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

  browservice:
    image: ghcr.io/tommiec/browservice:latest
    container_name: browservice
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8083:8080"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - proxynet

networks:
  proxynet:
    name: proxynet
    driver: bridge

volumes:
  adguard_work:
  adguard_conf:
